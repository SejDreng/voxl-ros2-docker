# =============================================================================
# docker-compose.drone.yml
# Run on the drone (aarch64 / Ubuntu 18 host)
# Uses the SLIM runtime image — no compilers, no dev tools
# Pre-built install/ artifacts are mounted in via volume
# =============================================================================
version: "3.3"

services:
  voxl:
    image: voxl-drone:runtime-arm64                   # Pre-built slim image
    container_name: voxl-runtime
    hostname: voxl-runtime
    privileged: true
    network_mode: host
    ipc: host
    shm_size: '256mb'
    volumes:
      - ./ros2_ws:/ros2_ws                            # Modified ros2_ws containing only required files for runtime
      - /dev:/dev                                     # Serial ports, cameras, IMU, GPIO
      - ./cyclonedds.xml:/tmp/cyclonedds.xml
      - ./entrypoint.sh:/tmp/entrypoint.sh
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///tmp/cyclonedds.xml
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: ["/bin/bash"]
    entrypoint: ["/tmp/entrypoint.sh"]
