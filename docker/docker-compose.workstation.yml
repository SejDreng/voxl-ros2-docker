# =============================================================================
# docker-compose.workstation.yml
# Run on your x86_64 dev machine for native development + cross-compilation
# =============================================================================
services:

  # ---------- Native x86 dev container (full dev tools) ----------
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: voxl-dev
    image: voxl-drone:dev-amd64
    container_name: voxl-dev
    hostname: voxl-dev
    privileged: true
    network_mode: host
    volumes:
      - ../ros2_ws/src:/ros2_ws/src
      - dev-build:/ros2_ws/build
      - dev-install:/ros2_ws/install
      - dev-log:/ros2_ws/log
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.docker.xauth:ro
      - /dev:/dev                                     # Serial ports, cameras, etc...
      - ./cyclonedds.xml:/etc/cyclonedds.xml:ro
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.docker.xauth
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - ROS_DISCOVERY_SERVER=${ROS_DISCOVERY_SERVER:-192.168.50.33:11811}
      - ROS_SUPER_CLIENT=${ROS_SUPER_CLIENT:-TRUE}
      - CYCLONEDDS_URI=file:///etc/cyclonedds.xml
    stdin_open: true
    tty: true
    command: /bin/bash

  # ---------- ARM64 cross-build via QEMU (full dev tools) ----------
  cross-arm64:
    build:
      context: .
      dockerfile: Dockerfile
      target: voxl-dev
    image: voxl-drone:dev-arm64
    container_name: voxl-cross-arm64
    platform: linux/arm64
    volumes:
      - ../ros2_ws/src:/ros2_ws/src
      - cross-build:/ros2_ws/build
      - cross-install:/ros2_ws/install
      - cross-log:/ros2_ws/log
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  cross-install:
    name: cross-install
  cross-build:
    name: cross-build
  cross-log:
    name: cross-log
  dev-build:
    name: dev-build
  dev-install:
    name: dev-install
  dev-log:
    name: dev-log

